version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: creditwise-db
    environment:
      POSTGRES_DB: ${DB_NAME:-creditwise}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Quarkus
  backend:
    build:
      context: ../backend/gestionner_microservice
      dockerfile: Dockerfile
    container_name: creditwise-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-creditwise}
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-password}
      QUARKUS_PROFILE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creditwise-frontend
    environment:
      VITE_API_BASE_URL: http://backend:8080
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optionnel - pour la production)
  nginx:
    image: nginx:alpine
    container_name: creditwise-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    environment:
      - UPSTREAM_FRONTEND=frontend:3000
      - UPSTREAM_BACKEND=backend:8080
    profiles:
      - production

volumes:
  postgres_data:

networks:
  default:
    name: creditwise-network
