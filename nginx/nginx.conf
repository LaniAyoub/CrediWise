# ============================================================
# CrediWise – Nginx reverse proxy / API gateway
# ============================================================
# This is the single network entry point for all traffic.
# Responsibilities:
#   - TLS termination (HTTP → HTTPS redirect)
#   - JWT auth_request validation against Keycloak
#   - CORS enforcement (CORS_ALLOWED_ORIGINS env var)
#   - Rate limiting (API and auth endpoints)
#   - Security headers on every response
#   - Routing to four Quarkus microservices + React SPA
# ============================================================

user  nginx;
worker_processes  auto;           # One worker per CPU core
worker_rlimit_nofile  65535;      # Max open files per worker

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;                    # Most efficient I/O model on Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────────────────
    # Logging — include real client IP even behind a proxy
    # ──────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ──────────────────────────────────────────────────────────
    # Performance
    # ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;          # Hide nginx version from error pages / headers

    # ──────────────────────────────────────────────────────────
    # Buffer / body limits — prevent large-request DoS
    # ──────────────────────────────────────────────────────────
    client_max_body_size    10m;
    client_body_buffer_size 128k;
    client_header_timeout   10s;
    client_body_timeout     10s;
    send_timeout            10s;

    # ──────────────────────────────────────────────────────────
    # Gzip — save bandwidth on JSON/HTML/JS responses
    # ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ──────────────────────────────────────────────────────────
    # Rate limiting zones
    # Key: $binary_remote_addr = 7 bytes per entry (compact)
    # ──────────────────────────────────────────────────────────
    # General API — 10 req/s per IP
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m    rate=10r/s;
    # Auth endpoints — 5 req/s per IP (brute-force protection)
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m   rate=5r/s;
    # Return 429 Too Many Requests (not default 503) on limit breach
    limit_req_status 429;

    # ──────────────────────────────────────────────────────────
    # CORS origin map — must be at http{} level (not server{})
    # Resolves the Vary header correctly: if the request Origin
    # matches the allowed origin, echo it back; otherwise "".
    # CORS_ALLOWED_ORIGINS is replaced by envsubst at startup.
    # ──────────────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default                       "";
        "~^${CORS_ALLOWED_ORIGINS}$"  $http_origin;
    }

    # ──────────────────────────────────────────────────────────
    # Shared upstreams
    # ──────────────────────────────────────────────────────────
    include /etc/nginx/conf.d/upstream.conf;

    # ──────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect (port 80)
    # ──────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME / Let's Encrypt HTTP-01 challenge passthrough
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Permanent redirect — 301 so browsers cache the upgrade
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────────────────────
    # HTTPS server (port 443)
    # ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ${NGINX_SERVER_NAME};   # Replaced at container start via envsubst

        # ── TLS configuration ──────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;  # openssl dhparam -out dhparam.pem 4096

        # Minimum TLS 1.2; prefer TLS 1.3
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suite — forward-secrecy first, no RC4/3DES/export
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;  # TLS 1.3 negotiates independently; off is correct

        # Session resumption — reduces handshake overhead
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;        # Disable tickets: avoids forward-secrecy bypass

        # OCSP stapling — client can verify cert revocation without CA round-trip
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers (defined in separate file for reuse) ──
        include /etc/nginx/conf.d/security-headers.conf;

        # ── CORS + auth_request helpers ────────────────────────
        include /etc/nginx/conf.d/auth.conf;

        # ──────────────────────────────────────────────────────
        # Internal auth_request endpoint
        # Nginx calls this sub-request to validate every API call.
        # Never exposed externally (internal only).
        # ──────────────────────────────────────────────────────
        location = /_auth_validate {
            internal;                               # Not reachable from outside
            proxy_pass http://keycloak_upstream/realms/crediwise/protocol/openid-connect/userinfo;
            proxy_pass_request_body off;            # Only headers needed for introspection
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
            proxy_connect_timeout 5s;
            proxy_read_timeout    5s;
        }

        # ──────────────────────────────────────────────────────
        # Health check — internal network only, no auth
        # Kubernetes liveness/readiness probes can use this.
        # ──────────────────────────────────────────────────────
        location = /health {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny  all;
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────────────
        # Keycloak passthrough — /auth/* → keycloak:8180
        # NO auth_request here: Keycloak is the auth provider itself.
        # Rate-limited to 5 req/s to prevent brute-force.
        # ──────────────────────────────────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://keycloak_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip the /auth prefix before forwarding
            rewrite ^/auth/(.*)$ /$1 break;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ──────────────────────────────────────────────────────
        # API routes — all require valid JWT (auth_request)
        # Rate-limited to 10 req/s per IP.
        # ──────────────────────────────────────────────────────

        # gestionnaire service
        location /api/gestionnaire/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept" always;
                add_header Access-Control-Max-Age           "86400" always;
                add_header Vary                             "Origin" always;
                return 204;
            }
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth_validate;
            auth_request_set $auth_status $upstream_status;
            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;

            # Forward validated identity headers downstream
            auth_request_set $x_auth_user  $upstream_http_x_auth_user;
            auth_request_set $x_auth_roles $upstream_http_x_auth_roles;
            proxy_set_header X-Auth-User  $x_auth_user;
            proxy_set_header X-Auth-Roles $x_auth_roles;
            proxy_set_header Authorization $http_authorization;

            proxy_pass http://gestionnaire_upstream/;
            include /etc/nginx/conf.d/proxy-common.conf;

            rewrite ^/api/gestionnaire/(.*)$ /$1 break;
        }

        # client service
        location /api/client/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept" always;
                add_header Access-Control-Max-Age           "86400" always;
                add_header Vary                             "Origin" always;
                return 204;
            }
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth_validate;
            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;

            auth_request_set $x_auth_user  $upstream_http_x_auth_user;
            auth_request_set $x_auth_roles $upstream_http_x_auth_roles;
            proxy_set_header X-Auth-User  $x_auth_user;
            proxy_set_header X-Auth-Roles $x_auth_roles;
            proxy_set_header Authorization $http_authorization;

            proxy_pass http://client_upstream/;
            include /etc/nginx/conf.d/proxy-common.conf;

            rewrite ^/api/client/(.*)$ /$1 break;
        }

        # nouvelle_demande service
        location /api/demandes/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept" always;
                add_header Access-Control-Max-Age           "86400" always;
                add_header Vary                             "Origin" always;
                return 204;
            }
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth_validate;
            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;

            auth_request_set $x_auth_user  $upstream_http_x_auth_user;
            auth_request_set $x_auth_roles $upstream_http_x_auth_roles;
            proxy_set_header X-Auth-User  $x_auth_user;
            proxy_set_header X-Auth-Roles $x_auth_roles;
            proxy_set_header Authorization $http_authorization;

            proxy_pass http://nouvelle_demande_upstream/;
            include /etc/nginx/conf.d/proxy-common.conf;

            rewrite ^/api/demandes/(.*)$ /$1 break;
        }

        # analyse service
        location /api/analyse/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept" always;
                add_header Access-Control-Max-Age           "86400" always;
                add_header Vary                             "Origin" always;
                return 204;
            }
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth_validate;
            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;

            auth_request_set $x_auth_user  $upstream_http_x_auth_user;
            auth_request_set $x_auth_roles $upstream_http_x_auth_roles;
            proxy_set_header X-Auth-User  $x_auth_user;
            proxy_set_header X-Auth-Roles $x_auth_roles;
            proxy_set_header Authorization $http_authorization;

            proxy_pass http://analyse_upstream/;
            include /etc/nginx/conf.d/proxy-common.conf;

            rewrite ^/api/analyse/(.*)$ /$1 break;
        }

        # ──────────────────────────────────────────────────────
        # React SPA — serve static files, fallback to index.html
        # No auth_request: the SPA itself handles auth via Keycloak PKCE.
        # ──────────────────────────────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;

            # SPA routing: unknown paths → index.html (React Router takes over)
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively; don't cache HTML
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma no-cache;
                add_header Expires 0;
            }
        }

        # ──────────────────────────────────────────────────────
        # Named error locations — safe JSON error bodies
        # Never expose internal details.
        # ──────────────────────────────────────────────────────
        location @unauthorized {
            add_header WWW-Authenticate 'Bearer realm="crediwise", error="invalid_token"' always;
            add_header Content-Type application/json always;
            return 401 '{"error":"Unauthorized","message":"Authentication required"}';
        }

        location @forbidden {
            add_header Content-Type application/json always;
            return 403 '{"error":"Forbidden","message":"Insufficient permissions"}';
        }
    }
}
