# ============================================================
# CrediWise – Common proxy settings (included in each location)
# ============================================================
# Included by every upstream location block to avoid repetition.
# ============================================================

# Use HTTP/1.1 so keepalive connections work (HTTP/1.0 doesn't support it)
proxy_http_version 1.1;

# Required for keepalive upstream connections
proxy_set_header Connection "";

# Pass real client IP to backend services so they can log it
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Host              $host;

# Timeouts — fail fast rather than holding connections open
proxy_connect_timeout  5s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# Buffer settings — prevent slow-client attacks (slowloris variant)
proxy_buffering on;
proxy_buffer_size          4k;
proxy_buffers              8 16k;
proxy_busy_buffers_size   32k;

# Do not forward Nginx error pages from upstream; let the upstream
# response pass through as-is so frontend gets correct JSON errors
proxy_intercept_errors off;
