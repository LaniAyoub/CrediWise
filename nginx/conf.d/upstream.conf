# ============================================================
# CrediWise – Upstream backend definitions
# ============================================================
# Each upstream uses keepalive connections to avoid the TCP
# handshake overhead on every request (critical for auth_request
# sub-requests which hit Keycloak on every API call).
#
# keepalive = max idle connections kept in the cache per worker.
# keepalive_requests = max requests per connection before close.
# keepalive_timeout = idle connection TTL.
#
# Service names match docker-compose service names so Docker's
# internal DNS resolves them automatically on the crediwise_net
# network. Never use 'localhost' inside the Docker network.
# ============================================================

# ── Gestionnaire service (HTTP :8080) ──────────────────────
upstream gestionnaire_upstream {
    server ${GESTIONNAIRE_HOST}:${GESTIONNAIRE_PORT};
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# ── Client service (HTTP :8082) ────────────────────────────
upstream client_upstream {
    server ${CLIENT_HOST}:${CLIENT_PORT};
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# ── Nouvelle Demande service (HTTP :8083) ──────────────────
upstream nouvelle_demande_upstream {
    server ${NOUVELLE_DEMANDE_HOST}:${NOUVELLE_DEMANDE_PORT};
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# ── Analyse service (HTTP :8084) ───────────────────────────
upstream analyse_upstream {
    server ${ANALYSE_HOST}:${ANALYSE_PORT};
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# ── Keycloak (HTTP :8080 inside Docker; exposed as :8180 on host) ──
# The container-internal port is 8080; Keycloak maps it to 8180
# on the host. Inside the Docker network we use the internal port.
upstream keycloak_upstream {
    server ${KEYCLOAK_HOST}:${KEYCLOAK_PORT};
    keepalive 16;
    keepalive_requests 500;
    keepalive_timeout  30s;
}
