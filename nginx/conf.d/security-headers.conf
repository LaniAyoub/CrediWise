# ============================================================
# CrediWise – Security response headers
# ============================================================
# Included in the HTTPS server block so every response —
# SPA assets, API proxied responses, error pages — carries
# these headers.
#
# 'always' flag: add the header even on error responses
# (4xx/5xx), not just 2xx/3xx.
# ============================================================

# ── HSTS ────────────────────────────────────────────────────
# Tell browsers to only ever contact this host over HTTPS for
# the next year, including all subdomains. 'preload' opts into
# browser vendor HSTS preload lists (submit at hstspreload.org).
# WARNING: Only add 'preload' once you are certain ALL
# subdomains can serve HTTPS — it is very difficult to undo.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Clickjacking protection ──────────────────────────────────
# Prevents this site from being embedded in an <iframe> on
# another origin — mitigates clickjacking attacks.
add_header X-Frame-Options "DENY" always;

# ── MIME-sniffing protection ─────────────────────────────────
# Prevents browsers from guessing a resource's content type.
# Without this, a malicious file uploaded as 'text/plain' could
# be sniffed as 'text/html' and executed.
add_header X-Content-Type-Options "nosniff" always;

# ── Referrer policy ─────────────────────────────────────────
# Send full URL as Referer on same-origin requests; only the
# origin (no path/query) on cross-origin HTTPS requests;
# nothing on HTTP downgrade. Prevents token/path leakage in
# Referer headers to third-party origins.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions policy ───────────────────────────────────────
# Disable powerful browser features this app does not need.
# Each '=()' disables the feature entirely for all origins.
# This prevents malicious scripts from silently enabling them.
add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), cross-origin-isolated=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;

# ── Content-Security-Policy ──────────────────────────────────
# Defence-in-depth against XSS: restrict where scripts, styles,
# frames, and other resources may load from.
#
# Key decisions:
#   - default-src 'self'  → block everything not explicitly allowed
#   - script-src 'self'   → no 'unsafe-inline'; use nonces in prod
#   - connect-src includes Keycloak so the PKCE flow can POST tokens
#   - frame-ancestors 'none' → belt-and-suspenders with X-Frame-Options
#   - upgrade-insecure-requests → browser upgrades http:// sub-resources
#
# NOTE: If you add Google Fonts, CDN assets etc., add their origins
# here rather than loosening to 'unsafe-inline' or '*'.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ${KEYCLOAK_PUBLIC_URL}; frame-ancestors 'none'; base-uri 'self'; form-action 'self' ${KEYCLOAK_PUBLIC_URL}; upgrade-insecure-requests" always;

# ── Cross-Origin policies ────────────────────────────────────
# COEP (embedder policy): require CORS or CORP header on all
# sub-resources — prevents Spectre-style side-channel leaks.
# COOP (opener policy): isolate the browsing context so
# cross-origin windows can't access this page via window.opener.
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy   "same-origin"  always;
add_header Cross-Origin-Resource-Policy "same-origin"  always;

# ── Remove headers that leak server internals ────────────────
# Quarkus / Java backends sometimes add these.
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
# Note: `more_clear_headers` requires the third-party ngx_headers_more module
# which is not included in the default nginx image. We rely on proxy_hide_header
# instead to avoid unknown directive errors.
