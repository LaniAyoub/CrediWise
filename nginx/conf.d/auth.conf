# ============================================================
# CrediWise – CORS + auth_request helpers
# ============================================================
# Included in the HTTPS server block.
#
# CORS strategy:
#   - The allowed origin is read from CORS_ALLOWED_ORIGINS env var
#     (set at container start via envsubst). Only one origin is
#     supported — for multiple origins use a map{} block in nginx.conf.
#   - Credentials: true (required for Bearer token cookies / PKCE).
#   - Preflight (OPTIONS) responses are short-circuited before
#     auth_request runs — the browser needs to succeed the preflight
#     without a token to know it is allowed to send one.
#
# auth_request strategy:
#   - Every /api/* location calls /_auth_validate (defined in nginx.conf).
#   - /_auth_validate proxies the caller's Authorization header to
#     Keycloak's /userinfo endpoint. A 200 means valid token; Keycloak
#     returns 401 for expired/invalid tokens.
#   - The validated sub and roles are extracted via auth_request_set
#     and forwarded to backends as X-Auth-User / X-Auth-Roles.
#   - /auth/* and /health are exempt — no auth_request on these paths.
# ============================================================

# ── CORS headers macro (applied in each API location via include) ──
# Defined here as a snippet; locations that need CORS call:
#   include /etc/nginx/conf.d/auth.conf
# and rely on the map above being in scope.
#
# Access-Control-Allow-Credentials: true is only sent when the
# origin matched — sending it with a wildcard '*' origin is
# a browser error, so we gate it on $cors_origin being non-empty.
#
# We set Vary: Origin so CDNs/proxies cache one response per origin
# rather than serving the wrong CORS headers to a second origin.

# ── Global CORS headers block ────────────────────────────────
# These are applied at the server{} level so they cover all locations
# including error responses (@unauthorized, @forbidden).
add_header Access-Control-Allow-Origin      $cors_origin  always;
add_header Access-Control-Allow-Credentials "true"        always;
add_header Vary                             "Origin"      always;

# ── OPTIONS preflight handler ────────────────────────────────
# Intercepts preflight before any auth_request sub-request.
# Must respond 204 immediately — no upstream call.
# The actual request will carry the token; the preflight does not.
location @preflight {
    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials "true"       always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept" always;
    add_header Access-Control-Max-Age           "86400" always;   # Cache preflight 24 h
    add_header Vary                             "Origin" always;
    add_header Content-Length 0;
    return 204;
}

# NOTE: OPTIONS preflight is handled inside each /api/* location
# in nginx.conf via if ($request_method = OPTIONS) — add_header
# inside if() is only valid in location context, not server context.
