syntax = "proto3";

package gestionnaire;

option java_package = "org.acme.grpc";
option java_outer_classname = "GestionnaireProto";
option java_multiple_files = true;

service GestionnaireService {
  rpc GetAgenceById (AgenceRequest) returns (AgenceResponse);
  rpc GetGestionnaireById (GestionnaireRequest) returns (GestionnaireResponse);
}

message AgenceRequest {
  string id_branch = 1;
}

message AgenceResponse {
  bool found = 1;
  string id_branch = 2;
  string libelle = 3;
  string wording = 4;
  bool is_active = 5;
}

message GestionnaireRequest {
  string id = 1;
}

message GestionnaireResponse {
  bool found = 1;
  string id = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string role = 6;
  bool is_active = 7;
  string agence_id = 8;
  string agence_libelle = 9;
}
