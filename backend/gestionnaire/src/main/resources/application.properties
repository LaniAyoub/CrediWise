
# APPLICATION GLOBALE
quarkus.application.name=gestionnaire_backend
quarkus.application.version=1.0.0-SNAPSHOT
quarkus.http.port=8080
quarkus.devservices.enabled=false

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=24H

# Swagger / OpenAPI
quarkus.smallrye-openapi.info-title=Gestionnaire Microservice API
quarkus.smallrye-openapi.info-version=1.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=Microservice for managing Gestionnaires
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# PostgreSQL
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5434/gestionnaire_db
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.username=${DB_USERNAME}
#quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.username=admin
quarkus.datasource.password=admin
# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=false


# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=classpath:db/migration

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.flyway".level=INFO

# =============================================
# JWT CONFIGURATION (s?curis? pour dev)

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=gestionnaire-service
smallrye.jwt.sign.key.location=privateKey.pem
# =============================================
# Email Configuration (Quarkus Mailer)
# =====================================================
# For Development: Use mock/test SMTP
# For Production: Configure with real SMTP server
# =====================================================

# SMTP Configuration
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.from=noreply@crediwise.com

# For production with Gmail:
# quarkus.mailer.host=smtp.gmail.com
# quarkus.mailer.port=587
# quarkus.mailer.start-tls=REQUIRED
# quarkus.mailer.username=your-email@gmail.com
# quarkus.mailer.password=your-app-password

# For production with Sendgrid or other services:
# quarkus.mailer.host=smtp.sendgrid.net
# quarkus.mailer.port=587
# quarkus.mailer.username=apikey
# quarkus.mailer.password=SG.your-sendgrid-api-key

# Mock mode (development):
quarkus.mailer.mock=true
quarkus.http.auth.proactive=false

# Dev profile
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.datasource.username=${DB_USERNAME:admin}
%dev.quarkus.datasource.password=${DB_PASSWORD:admin}

# Test profile
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.enabled=false

# gRPC Server
quarkus.grpc.server.port=9000
quarkus.grpc.server.host=0.0.0.0
