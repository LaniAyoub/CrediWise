# APPLICATION GLOBALE
quarkus.application.name=gestionnaire_backend
quarkus.application.version=1.0.0-SNAPSHOT
quarkus.http.port=8080
quarkus.devservices.enabled=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin
quarkus.http.cors.access-control-allow-credentials=true


# Swagger / OpenAPI
quarkus.smallrye-openapi.info-title=Gestionnaire Microservice API
quarkus.smallrye-openapi.info-version=1.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=Microservice for managing Gestionnaires
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# PostgreSQL
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gestionnaire_db
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:admin}
quarkus.datasource.password=${DB_PASSWORD:admin}

# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=false


# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=classpath:db/migration

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.flyway".level=INFO
quarkus.log.category."io.quarkus.oidc".level=INFO
quarkus.log.category."io.quarkus.security".level=INFO
quarkus.log.category."org.acme.security".level=INFO

# =============================================
# OIDC / Keycloak Configuration
# =============================================
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/crediwise}
quarkus.oidc.client-id=crediwise-backend
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:crediwise-backend-secret}
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=crediwise-backend
quarkus.oidc.token.issuer=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/crediwise}
quarkus.oidc.roles.source=accesstoken
quarkus.oidc.roles.role-claim-path=realm_roles
quarkus.oidc.jwks.resolve-early=true

# Force authentication check before endpoint dispatch
quarkus.http.auth.proactive=true

# =============================================
# Email Configuration (Quarkus Mailer)
# =============================================

# SMTP Configuration
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.from=noreply@crediwise.com

# Mock mode (development):
quarkus.mailer.mock=true

# Dev profile
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.datasource.username=${DB_USERNAME:admin}
%dev.quarkus.datasource.password=${DB_PASSWORD:admin}
%dev.quarkus.oidc.auth-server-url=http://localhost:8180/realms/crediwise
%dev.quarkus.oidc.token.issuer=http://localhost:8180/realms/crediwise
# Retry OIDC connection for 30 s at startup so startup order doesn't matter
%dev.quarkus.oidc.connection-delay=PT30S
# Fetch JWKS lazily (on first request) so a pre-Keycloak start doesn't break auth
%dev.quarkus.oidc.jwks.resolve-early=false
%dev.quarkus.log.category."io.quarkus.oidc".level=DEBUG
%dev.quarkus.log.category."io.quarkus.security".level=DEBUG

# Test profile
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.enabled=false

# =============================================
# gRPC Server Configuration
# =============================================
quarkus.grpc.server.port=9000
quarkus.grpc.server.host=0.0.0.0

# gRPC TLS (disabled in dev, enable for production)
#quarkus.grpc.server.ssl.certificate=certs/gestionnaire.pem
#quarkus.grpc.server.ssl.key=certs/gestionnaire-key.pem
#quarkus.grpc.server.ssl.trust-store=certs/ca.pem
