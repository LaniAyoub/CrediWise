# Override test profile from main application.properties
# Enable Hibernate ORM and Flyway for integration tests
quarkus.hibernate-orm.enabled=true
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Enable DevServices — auto-starts PostgreSQL via Testcontainers (Docker required)
quarkus.devservices.enabled=true
quarkus.datasource.devservices.enabled=true

# JWT config inherited from main application.properties (keys on classpath)

# Reduce logging noise in tests
quarkus.log.level=WARN
quarkus.log.category."org.acme".level=INFO
quarkus.log.category."org.flyway".level=INFO
