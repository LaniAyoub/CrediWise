# APPLICATION GLOBALE
quarkus.application.name=client_backend
quarkus.application.version=1.0.0-SNAPSHOT
quarkus.http.port=8082
quarkus.devservices.enabled=false

# CORS — externalized for prod override
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-max-age=86400

# Swagger / OpenAPI
quarkus.smallrye-openapi.info-title=Client Microservice API
quarkus.smallrye-openapi.info-version=1.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=Microservice for managing Clients
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# PostgreSQL — credentials from env vars with dev defaults
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/client_db
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:admin}
quarkus.datasource.password=${DB_PASSWORD:admin}

# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.bind-parameters=false
quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=classpath:db/migration

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.flyway".level=INFO
quarkus.log.category."org.acme.security".level=INFO

# =============================================
# OIDC / Keycloak Configuration
# =============================================
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/crediwise}
quarkus.oidc.client-id=crediwise-backend
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:crediwise-backend-secret}
quarkus.oidc.application-type=service
quarkus.oidc.roles.source=accesstoken
quarkus.oidc.roles.role-claim-path=realm_roles
quarkus.oidc.token.audience=crediwise-backend
quarkus.oidc.token.issuer=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/crediwise}
quarkus.oidc.jwks.resolve-early=true

# Proactive auth — validate token on every request before resource dispatch
quarkus.http.auth.proactive=true

# =============================================
# Email Configuration (Quarkus Mailer)
# =============================================
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.from=noreply@crediwise.com
quarkus.mailer.mock=true

# =============================================
# gRPC Server (this service: port 9001)
# =============================================
quarkus.grpc.server.port=9001
quarkus.grpc.server.use-separate-server=true

# gRPC Server TLS (prod)
#quarkus.grpc.server.ssl.certificate=classpath:tls/server.crt
#quarkus.grpc.server.ssl.key=classpath:tls/server.key

# =============================================
# gRPC Client — gestionnaire-service (:9000)
# =============================================
quarkus.grpc.clients.gestionnaire-service.host=localhost
quarkus.grpc.clients.gestionnaire-service.port=9000

# gRPC Client TLS (prod)
#quarkus.grpc.clients.gestionnaire-service.ssl.trust-store=classpath:tls/ca.crt
#quarkus.grpc.clients.gestionnaire-service.plain-text=false

# Dev profile
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.datasource.username=${DB_USERNAME:admin}
%dev.quarkus.datasource.password=${DB_PASSWORD:admin}
%dev.quarkus.oidc.connection-delay=PT30S
%dev.quarkus.oidc.jwks.resolve-early=false

# Test profile
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.enabled=false

