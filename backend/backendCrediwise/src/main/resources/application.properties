# =============================================
# APPLICATION GLOBALE
# =============================================
quarkus.http.port=8082
quarkus.log.level=INFO
quarkus.devservices.enabled=false

# Swagger / OpenAPI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# =============================================
# DATASOURCE + HIBERNATE CLIENT
# =============================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=ranim
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/clientMicroservice

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.packages=ClientMicroservice.entities
quarkus.hibernate-orm.log.sql=true

# =============================================
# DATASOURCE + HIBERNATE GESTIONNAIRE
# =============================================
quarkus.datasource.gestionnaire.db-kind=postgresql
quarkus.datasource.gestionnaire.username=postgres
quarkus.datasource.gestionnaire.password=ranim
quarkus.datasource.gestionnaire.jdbc.url=jdbc:postgresql://localhost:5432/gestionnaireMicroservice

quarkus.hibernate-orm.gestionnaire.datasource=gestionnaire
quarkus.hibernate-orm.gestionnaire.database.generation=update
quarkus.hibernate-orm.gestionnaire.sql-load-script=import-gestionnaire.sql
quarkus.hibernate-orm.gestionnaire.packages=GestionnaireMicroservice.entities

# =============================================
# JWT CONFIGURATION (sécurisé pour dev)
# =============================================
smallrye.jwt.issuer=https://gestionnaire-microservice

# Durée de vie du token : 1 heure
smallrye.jwt.expiration=3600

# Optionnel : relaxe la validation de clé (utile en dev)
smallrye.jwt.sign.relax-key-validation=true

# Pour la vérification (męme microservice)
mp.jwt.verify.issuer=https://gestionnaire-microservice
mp.jwt.token.header=Authorization

# =============================================
# SÉCURITÉ - Protection des endpoints
# =============================================

# Tous les endpoints sous /api/gestionnaires nécessitent un token JWT valide
quarkus.http.auth.permission.gestionnaires.paths=/api/gestionnaires/*
quarkus.http.auth.permission.gestionnaires.policy=authenticated

# Le login reste public
quarkus.http.auth.permission.public.paths=/api/auth/login
quarkus.http.auth.permission.public.policy=permit

# Swagger reste accessible en dev
quarkus.http.auth.permission.swagger.paths=/q/*
quarkus.http.auth.permission.swagger.policy=permit