# Unit-style tests rely on mocked repositories.
# Disable DB bootstrap and OIDC to avoid Testcontainers / Keycloak startup.
quarkus.hibernate-orm.enabled=false
quarkus.flyway.migrate-at-start=false
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false

# Disable OIDC — tests use @InjectMock and don't need a live Keycloak
quarkus.oidc.enabled=false

# Reduce logging noise in tests
quarkus.log.level=WARN
quarkus.log.category."org.acme".level=INFO
