# APPLICATION GLOBALE
quarkus.application.name=New_Request_backend
quarkus.application.version=1.0.0-SNAPSHOT
quarkus.http.port=8083
quarkus.devservices.enabled=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept,Origin
quarkus.http.cors.access-control-max-age=24H

# Swagger / OpenAPI
quarkus.smallrye-openapi.info-title=New Request Microservice API
quarkus.smallrye-openapi.info-version=1.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=Microservice for managing New Request
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# PostgreSQL
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5434/nouvelle_demande_db
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.username=${DB_USERNAME}
#quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.username=admin
quarkus.datasource.password=admin
# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.bind-parameters=false
quarkus.hibernate-orm.mapping.format.global=ignore


# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=classpath:db/migration

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.flyway".level=INFO

# =============================================
# JWT CONFIGURATION (s?curis? pour dev)

mp.jwt.verify.publickey.location=publicKey.pem
# Tokens are issued by the gestionnaire service — must match its issuer claim
mp.jwt.verify.issuer=gestionnaire-service
mp.jwt.verify.audiences=gestionnaire-api
# =============================================
# Email Configuration (Quarkus Mailer)
# =====================================================
# For Development: Use mock/test SMTP
# For Production: Configure with real SMTP server
# =====================================================

# SMTP Configuration
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.from=noreply@crediwise.com

# For production with Gmail:
# quarkus.mailer.host=smtp.gmail.com
# quarkus.mailer.port=587
# quarkus.mailer.start-tls=REQUIRED
# quarkus.mailer.username=your-email@gmail.com
# quarkus.mailer.password=your-app-password

# For production with Sendgrid or other services:
# quarkus.mailer.host=smtp.sendgrid.net
# quarkus.mailer.port=587
# quarkus.mailer.username=apikey
# quarkus.mailer.password=SG.your-sendgrid-api-key

# Mock mode (development):
quarkus.mailer.mock=true
quarkus.http.auth.proactive=false

# Dev profile
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.datasource.username=${DB_USERNAME:admin}
%dev.quarkus.datasource.password=${DB_PASSWORD:admin}

# Test profile
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.enabled=false

# gRPC Client - This service needs to call the gestionnaire service
# Make sure this port matches the gestionnaire's gRPC *server* port (default is 9000)
quarkus.grpc.clients.gestionnaire-service.host=localhost
quarkus.grpc.clients.gestionnaire-service.port=9000

# gRPC Client - Call the client service on port 9001
quarkus.grpc.clients.client-service.host=localhost
quarkus.grpc.clients.client-service.port=9001

# gRPC Server - This service starts its own server on a different port to avoid conflict
quarkus.grpc.server.port=9002

