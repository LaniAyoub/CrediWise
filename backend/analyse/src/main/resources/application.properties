# APPLICATION GLOBALE
quarkus.application.name=Analyse_backend
quarkus.application.version=1.0.0-SNAPSHOT
quarkus.http.port=8084
quarkus.devservices.enabled=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept,Origin
quarkus.http.cors.access-control-max-age=24H

# Swagger / OpenAPI
quarkus.smallrye-openapi.info-title=Analyse Microservice API
quarkus.smallrye-openapi.info-version=1.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=Microservice for managing Analyse
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# PostgreSQL
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/analyse_db
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:admin}
quarkus.datasource.password=${DB_PASSWORD:admin}
# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.bind-parameters=false
quarkus.hibernate-orm.mapping.format.global=ignore


# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=classpath:db/migration

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.flyway".level=INFO

# =============================================
# OIDC / Keycloak Configuration
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/crediwise}
quarkus.oidc.client-id=crediwise-backend
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:crediwise-backend-secret}
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=crediwise-backend
quarkus.oidc.token.issuer=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/crediwise}
quarkus.oidc.jwks.resolve-early=true
quarkus.oidc.roles.source=accesstoken
quarkus.oidc.roles.role-claim-path=realm_roles
quarkus.http.auth.proactive=true
# =============================================
# Email Configuration (Quarkus Mailer)
# =====================================================
# For Development: Use mock/test SMTP
# For Production: Configure with real SMTP server
# =====================================================

# SMTP Configuration
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.from=noreply@crediwise.com

# For production with Gmail:
# quarkus.mailer.host=smtp.gmail.com
# quarkus.mailer.port=587
# quarkus.mailer.start-tls=REQUIRED
# quarkus.mailer.username=your-email@gmail.com
# quarkus.mailer.password=your-app-password

# For production with Sendgrid or other services:
# quarkus.mailer.host=smtp.sendgrid.net
# quarkus.mailer.port=587
# quarkus.mailer.username=apikey
# quarkus.mailer.password=SG.your-sendgrid-api-key

# Mock mode (development):
quarkus.mailer.mock=true

# Dev profile
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.oidc.connection-delay=PT30S
%dev.quarkus.oidc.jwks.resolve-early=false

# Test profile
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.enabled=false

# gRPC Client - gestionnaire service (port 9000)
quarkus.grpc.clients.gestionnaire-service.host=${GESTIONNAIRE_GRPC_HOST:localhost}
quarkus.grpc.clients.gestionnaire-service.port=${GESTIONNAIRE_GRPC_PORT:9000}
quarkus.grpc.clients.gestionnaire-service.plain-text=true

# gRPC Client - client service (port 9001)
quarkus.grpc.clients.client-service.host=${CLIENT_GRPC_HOST:localhost}
quarkus.grpc.clients.client-service.port=${CLIENT_GRPC_PORT:9001}
quarkus.grpc.clients.client-service.plain-text=true

# gRPC Client - nouvelle-demande service (port 9002)
quarkus.grpc.clients.nouvelle-demande-service.host=${NOUVELLE_DEMANDE_GRPC_HOST:localhost}
quarkus.grpc.clients.nouvelle-demande-service.port=${NOUVELLE_DEMANDE_GRPC_PORT:9002}
quarkus.grpc.clients.nouvelle-demande-service.plain-text=true

# gRPC Server
quarkus.grpc.server.port=9003
quarkus.grpc.server.plain-text=true

