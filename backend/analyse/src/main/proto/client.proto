// COPY of backend/client/src/main/proto/client.proto
// IMPORTANT: Update both files together when this proto changes.
// This copy is needed for analyse service to generate gRPC client stubs.

syntax = "proto3";

package client;

option java_package = "org.acme.grpc";
option java_outer_classname = "ClientProto";
option java_multiple_files = true;

service ClientService {
  rpc GetClientById (ClientRequest) returns (ClientResponse);
  rpc IncrementClientCycle (ClientRequest) returns (ClientCycleUpdateResponse);
}

message ClientRequest {
  string id = 1;
}

message ClientResponse {
  bool found = 1;
  string id = 2;
  string client_type = 3;

  // Physical person
  string first_name = 4;
  string last_name = 5;
  string date_of_birth = 6;
  string national_id = 7;
  string gender = 8;
  string marital_status = 9;
  string nationality = 10;
  string monthly_income = 11;

  // Legal entity
  string company_name = 12;
  string sigle = 13;
  string registration_number = 14;
  string principal_interlocutor = 15;

  // Contact
  string email = 16;
  string primary_phone = 17;
  string secondary_phone = 18;

  // Address
  string address_street = 19;
  string address_city = 20;
  string address_postal = 21;
  string address_country = 22;

  // Account
  string account_number = 23;

  // Resolved local labels
  string segment = 24;
  string account_type = 25;
  string business_sector = 26;
  string business_activity = 27;

  // External refs
  string branch_id = 28;
  string assigned_manager_id = 29;

  // Scoring / lifecycle
  string scoring = 30;
  string cycle = 31;
  string status = 32;

  // Risk level
  string ifc_level_of_risk = 33;
}

message ClientCycleUpdateResponse {
  bool success = 1;
  string cycle = 2;
}
