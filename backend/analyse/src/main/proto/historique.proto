// COPY of backend/nouvelle_demande/src/main/proto/historique.proto
// IMPORTANT: Update both files together when this proto changes.
// This copy is needed for analyse service to generate gRPC client stubs.

syntax = "proto3";

package historique;

option java_package = "org.acme.grpc";
option java_outer_classname = "HistoriqueProto";
option java_multiple_files = true;

service HistoriqueService {
  rpc GetDemandesForClient (GetDemandesForClientRequest) returns (DemandeSummaryListResponse);
}

message GetDemandesForClientRequest {
  string client_id = 1;  // UUID as string
}

message DemandeSummary {
  int64 demande_id = 1;
  string status = 2;                           // DRAFT|SUBMITTED|VALIDATED|REJECTED
  string requested_amount = 3;                 // as string (e.g., "15000.00")
  int32 duration_months = 4;
  string product_name = 5;
  string loan_purpose = 6;
  string manager_name = 7;
  string application_channel = 8;
  bool banking_restriction = 9;
  bool legal_issue_or_account_blocked = 10;
  int32 guarantors_count = 11;
  int32 guarantees_count = 12;
  string created_at = 13;                      // ISO datetime string
  string updated_at = 14;
}

message DemandeSummaryListResponse {
  bool success = 1;
  repeated DemandeSummary demandes = 2;
  string error_message = 3;                    // if success=false
}
